# notion
# https://github.com/lockon-n/notion-mcp-server

type: stdio
name: notion_official
params:
  command: "npx"
  args:
    - "mcp-remote"
    - "https://mcp.notion.com/mcp"
  env:
    MCP_REMOTE_CONFIG_DIR: "./configs/.mcp-auth"
    HTTP_PROXY: "http://10.0.0.134:1081"
    HTTPS_PROXY: "http://10.0.0.134:1081"
    NO_PROXY: "localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16,.aliyun.com,.aliyuncs.com,.sufy.com"
    NODE_OPTIONS: "-r /workspace/configs/proxy-bootstrap.js"
client_session_timeout_seconds: 300
cache_tools_list: true