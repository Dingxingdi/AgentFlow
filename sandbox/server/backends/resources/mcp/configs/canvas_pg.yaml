# canvas_pg
# PostgreSQL-backed Canvas MCP server using gym's mcp-canvas-lms with PgCanvasRouter.
# Use for tasks that require pre-seeded Canvas data from toolathlon_pg (canvas.* schema).
# Requires toolathlon_pg container running at localhost:5434.
type: stdio
name: canvas_pg
params:
  command: node
  args:
    - "${local_servers_paths}/mcp-canvas-lms/build/index.js"
  env:
    # Setting CANVAS_DOMAIN to localhost:* activates PgCanvasRouter (skips HTTP Canvas API)
    CANVAS_API_TOKEN: "placeholder"
    CANVAS_DOMAIN: "localhost:9999"
    NODE_TLS_REJECT_UNAUTHORIZED: "0"
    # PostgreSQL connection — toolathlon_pg mapped to localhost:5434 on the host
    PG_HOST: "localhost"
    PG_PORT: "5434"
    PG_DATABASE: "${config.pg_database}"
    PG_USER: "eigent"
    PG_PASSWORD: "camel"
  cwd: "${agent_workspace}"
client_session_timeout_seconds: 60
cache_tools_list: true
